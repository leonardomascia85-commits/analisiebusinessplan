<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="80" y="80" width="6" height="80" rx="3" fill="url(#accent)"/>
  <!-- Logo letter A -->
  <rect x="80" y="180" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="108" y="219" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <!-- Main title -->
  <text x="80" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="white">Analisi e Business Plan</text>
  <!-- Subtitle -->
  <text x="80" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#94A3B8">Software professionale per PMI italiane</text>
  <!-- Feature pills -->
  <rect x="80" y="410" width="220" height="44" rx="22" fill="rgba(37,99,235,0.2)" stroke="#2563EB" stroke-width="1.5"/>
  <text x="190" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#60A5FA" text-anchor="middle">Analisi XBRL</text>
  <rect x="320" y="410" width="240" height="44" rx="22" fill="rgba(6,182,212,0.2)" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="440" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#67E8F9" text-anchor="middle">Business Plan AI</text>
  <rect x="580" y="410" width="240" height="44" rx="22" fill="rgba(16,185,129,0.2)" stroke="#10B981" stroke-width="1.5"/>
  <text x="700" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#6EE7B7" text-anchor="middle">38 Settori</text>
  <!-- Domain -->
  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#475569">analisiebusinessplan.it</text>
  <!-- Decorative chart bars -->
  <rect x="920" y="200" width="40" height="200" rx="6" fill="rgba(37,99,235,0.3)"/>
  <rect x="980" y="150" width="40" height="250" rx="6" fill="rgba(37,99,235,0.5)"/>
  <rect x="1040" y="100" width="40" height="300" rx="6" fill="url(#accent)" opacity="0.8"/>
  <rect x="1100" y="160" width="40" height="240" rx="6" fill="rgba(6,182,212,0.5)"/>
</svg>
